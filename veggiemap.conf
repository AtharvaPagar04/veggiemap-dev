# ══════════════════════════════════════════════════════════════════════════════
#  Nginx config for VeggieMap — veggiemap.codewithvin.app
#
#  Deploy instructions (on EC2):
#    sudo cp veggiemap.conf /etc/nginx/sites-available/veggiemap
#    sudo ln -s /etc/nginx/sites-available/veggiemap /etc/nginx/sites-enabled/
#    sudo nginx -t && sudo systemctl reload nginx
#
#  Then obtain SSL cert:
#    sudo certbot --nginx -d veggiemap.codewithvin.app
# ══════════════════════════════════════════════════════════════════════════════

# ── Redirect HTTP → HTTPS ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name veggiemap.codewithvin.app;
    return 301 https://$host$request_uri;
}

# ── Main HTTPS server block ───────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name veggiemap.codewithvin.app;

    # ── SSL certificates (filled in by certbot automatically) ──────────────
    # ssl_certificate     /etc/letsencrypt/live/veggiemap.codewithvin.app/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/veggiemap.codewithvin.app/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ───────────────────────────────────────────────────
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # ── Gzip compression ───────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # ── Client body size (for image uploads) ──────────────────────────────
    client_max_body_size 10M;

    # ── 1. Socket.io — WebSocket proxy (MUST be before /api block) ─────────
    location /socket.io/ {
        proxy_pass         http://localhost:5000;
        proxy_http_version 1.1;

        # WebSocket upgrade headers
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Keep WebSocket connections alive
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
    }

    # ── 2. Backend API routes (/api/*) ─────────────────────────────────────
    location /api/ {
        proxy_pass         http://localhost:5000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable buffering for streaming responses
        proxy_buffering off;
    }

    # ── 3. Uploaded files (/uploads/*) ────────────────────────────────────
    location /uploads/ {
        proxy_pass         http://localhost:5000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cache static files for 7 days
        proxy_cache_valid 200 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # ── 4. Everything else → Next.js frontend (port 3000) ─────────────────
    location / {
        proxy_pass         http://localhost:3000;
        proxy_http_version 1.1;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
